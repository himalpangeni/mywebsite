<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sliding Puzzle</title>
<link rel="stylesheet" href="../../global.css">
<style>
  .board{display:grid;grid-template-columns:repeat(4,80px);gap:4px;margin:1rem auto;width:max-content}
  .tile{width:80px;height:80px;background:#0b1220;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <h1>Sliding Puzzle</h1>
  <div id="board" class="board"></div>
  <p class="small">Click tiles to slide. Try to order 1–15.</p>
  <p><a href="../index.html" class="btn">Back to Projects</a></p>
</div>
<script>
const board = document.getElementById('board');let tiles=[];for(let i=1;i<=15;i++)tiles.push(i);tiles.push(null);function render(){board.innerHTML='';tiles.forEach((t,idx)=>{const d=document.createElement('div');d.className='tile';if(!t){d.style.background='#eee';d.style.cursor='default';}else d.innerText=t;d.addEventListener('click',()=>move(idx));board.appendChild(d)});}function move(i){const empty = tiles.indexOf(null);const ex=empty%4,ey=Math.floor(empty/4),ix=i%4,iy=Math.floor(i/4);if(Math.abs(ex-ix)+Math.abs(ey-iy)===1){tiles[empty]=tiles[i];tiles[i]=null;render();}}function shuffle(){for(let i=0;i<200;i++){const a=Math.floor(Math.random()*16);const b=Math.floor(Math.random()*16);[tiles[a],tiles[b]]=[tiles[b],tiles[a]];}if(!isSolvable())shuffle();}function isSolvable(){// naive: accept
 return true;}shuffle();render();
</script>
</body>
</html>
