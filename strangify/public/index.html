<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Strangify | Random Stranger Chat</title>
  <link rel="stylesheet" href="style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div class="glass-bg"></div>
  <div class="app-container">
    <header>
      <h1>Strangify</h1>
      <div id="stats"><span id="onlineCount">0</span> online</div>
    </header>
    
    <div id="statusBox" class="status-box">Press "Start" to meet a stranger.</div>
    <div id="chatBox" class="chat-box"></div>
    <div id="typingIndicator" class="typing-indicator hidden">Stranger is typing...</div>

    <div class="controls-container">
      <button id="nextBtn" class="btn next-btn" onclick="nextPerson()">Start / Next</button>
      <div class="input-wrapper">
        <input type="text" id="msgInput" placeholder="Type a message..." disabled oninput="handleTyping()" onkeypress="handleEnter(event)">
        <button id="sendBtn" class="btn" onclick="sendMessage()" disabled>Send</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
