<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Welcome!</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="blog.html">Blog</a>
        </nav>
    </header>

    <main class="container">
        <form id="authForm">
            <!-- Dynamic content based on URL params -->
            <div id="loginSection" style="display: none;">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Password" required>
            </div>

            <div id="signupSection" style="display: none;">
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email" required>
                <input type="tel" placeholder="Phone" required>
            </div>

            <button type="submit" class="btn">Submit</button>
        </form>
        <form>
            <table>
                <tr>
                    <td>Please Enter Your First Name:</td>
                </tr>
                <tr>
                    <td>
                        <input type="text" placeholder="First Name" name="">
                    </td>
                </tr>
                <tr>
                    <td>Please Enter Your Last Name:</td>
                </tr>
                <tr>
                    <td>
                        <input type="text" placeholder="Last Name" name="">
                    </td>
                </tr>
        
                <tr>
                    <td>Please Enter Your Password:</td>
                </tr>
                <tr>
                    <td> <input type="password" placeholder="Password" name="">
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="Submit" value="Submit" name="">
                    </td>
                </tr>
            </table>
        </form>        
    </main>

    <script>
        // Handle login/signup toggle
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');

        if (type === 'login') {
            document.getElementById('loginSection').style.display = 'block';
        } else if (type === 'signup') {
            document.getElementById('signupSection').style.display = 'block';
        }
    </script>
</body>
</html>
