<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Interactive App Mockup</title>
  <style>
    body { margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; font-family: 'Segoe UI', sans-serif; color: white; }
    .card { background: rgba(255,255,255,0.03); padding: 50px 50px 30px; border-radius: 20px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); max-width: 500px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; }
    h1 { margin-top: 0; font-size: 2.8rem; background: linear-gradient(90deg, #22c55e, #00d2ff); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; }
    .tag { display: inline-block; padding: 8px 18px; background: rgba(34,197,94,0.1); border-radius: 30px; font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .nav-btn { position: absolute; top: 30px; left: 30px; display: inline-block; padding: 12px 25px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .nav-btn:hover { background: #22c55e; color: #000; }
    canvas { border: 2px solid #22c55e; border-radius: 8px; margin-top: 20px; box-shadow: 0 0 20px rgba(34,197,94,0.3); }
    #score { font-size: 1.5rem; margin: 15px 0 5px; color: #22c55e; font-weight: bold; }
    #msg { color: #ff007f; font-weight: bold; min-height: 24px; }
    button { padding: 12px 30px; background: #22c55e; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    button:hover { background: #16a34a; }
  </style>
</head>
<body>
  <a href="../../index.html" class="nav-btn">← Return to Hub</a>
  <div class="card">
    <div class="tag">Interactive Game (C-style)</div>
    <h1>Snake Game</h1>
    <p>Use arrow keys to control the snake. Eat food to grow!</p>
    <div id="score">Score: 0</div>
    <div id="msg">Press Start to Play</div>
    <canvas id="c" width="300" height="300"></canvas><br>
    <button onclick="startGame()">▶ Start Game</button>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const CELL = 15, COLS = 20, ROWS = 20;
    let snake, dir, food, score, interval, running = false;

    function startGame() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0};
      score = 0;
      placeFood();
      document.getElementById('score').textContent = 'Score: 0';
      document.getElementById('msg').textContent = '';
      clearInterval(interval);
      running = true;
      interval = setInterval(tick, 130);
    }

    function placeFood() {
      food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
    }

    function tick() {
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
        clearInterval(interval); running = false;
        document.getElementById('msg').textContent = `Game Over! Score: ${score}`;
        return;
      }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) { score++; document.getElementById('score').textContent='Score: '+score; placeFood(); }
      else snake.pop();
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,canvas.width,canvas.height);
      // Draw food
      ctx.fillStyle = '#ff007f';
      ctx.fillRect(food.x*CELL, food.y*CELL, CELL-2, CELL-2);
      // Draw snake
      snake.forEach((s,i) => {
        ctx.fillStyle = i===0 ? '#22c55e' : '#166534';
        ctx.fillRect(s.x*CELL, s.y*CELL, CELL-2, CELL-2);
      });
    }

    document.addEventListener('keydown', e => {
      if (!running) return;
      if (e.key==='ArrowUp' && dir.y===0) dir={x:0,y:-1};
      else if (e.key==='ArrowDown' && dir.y===0) dir={x:0,y:1};
      else if (e.key==='ArrowLeft' && dir.x===0) dir={x:-1,y:0};
      else if (e.key==='ArrowRight' && dir.x===0) dir={x:1,y:0};
    });

    draw();
  </script>
</body>
</html>
