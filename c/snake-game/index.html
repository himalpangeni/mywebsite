<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake Game - Interactive App Mockup</title>
  <style>
    body { margin: 0; padding: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; font-family: 'Segoe UI', sans-serif; color: white; }
    .card { background: rgba(255,255,255,0.03); padding: 50px 50px 30px; border-radius: 20px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); max-width: 500px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; }
    h1 { margin-top: 0; font-size: 2.8rem; background: linear-gradient(90deg, #22c55e, #00d2ff); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; }
    .tag { display: inline-block; padding: 8px 18px; background: rgba(34,197,94,0.1); border-radius: 30px; font-size: 0.85rem; font-weight: bold; margin-bottom: 20px; color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .nav-btn { position: absolute; top: 30px; left: 30px; display: inline-block; padding: 12px 25px; background: rgba(255,255,255,0.05); color: #fff; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
    .nav-btn:hover { background: #22c55e; color: #000; }
    canvas { border: 2px solid #22c55e; border-radius: 8px; margin-top: 20px; box-shadow: 0 0 20px rgba(34,197,94,0.3); }
    #score { font-size: 1.5rem; margin: 15px 0 5px; color: #22c55e; font-weight: bold; }
    #msg { color: #ff007f; font-weight: bold; min-height: 24px; }
    button { padding: 12px 30px; background: #22c55e; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 1rem; }
    button:hover { background: #16a34a; }
  
    /* ===== MOBILE TOUCH CONTROLS ===== */
    #touch-dpad {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    @media (max-width: 900px), (pointer: coarse) {
      #touch-dpad { display: grid; }
    }
    #touch-dpad.lr { grid-template-columns: 1fr 1fr; gap: 20px; }
    #touch-dpad.udlr { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 6px; width: 180px; }
    #touch-dpad.tap { grid-template-columns: 1fr; }
    .dpad-btn {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(0,210,255,0.4);
      border-color: #00d2ff;
      transform: scale(0.9);
    }
    .dpad-btn.tap-btn {
      width: 120px;
      height: 120px;
      font-size: 40px;
      background: rgba(0,210,255,0.15);
      border-color: #00d2ff;
    }
    #touch-hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      pointer-events: none;
      z-index: 9998;
      display: none;
    }
    @media (max-width: 900px), (pointer: coarse) {
      #touch-hint { display: block; }
      canvas { touch-action: none; }
    }
    /* ===== END MOBILE TOUCH CONTROLS ===== */

  </style>
</head>
<body>
  <a href="../../index.html" class="nav-btn">← Return to Hub</a>
  <div class="card">
    <div class="tag">Interactive Game (C-style)</div>
    <h1>Snake Game</h1>
    <p>Use arrow keys to control the snake. Eat food to grow!</p>
    <div id="score">Score: 0</div>
    <div id="msg">Press Start to Play</div>
    <canvas id="c" width="300" height="300"></canvas><br>
    <button onclick="startGame()">▶ Start Game</button>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const CELL = 15, COLS = 20, ROWS = 20;
    let snake, dir, food, score, interval, running = false;

    function startGame() {
      snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
      dir = {x:1,y:0};
      score = 0;
      placeFood();
      document.getElementById('score').textContent = 'Score: 0';
      document.getElementById('msg').textContent = '';
      clearInterval(interval);
      running = true;
      interval = setInterval(tick, 130);
    }

    function placeFood() {
      food = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
    }

    function tick() {
      const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS || snake.some(s=>s.x===head.x&&s.y===head.y)) {
        clearInterval(interval); running = false;
        document.getElementById('msg').textContent = `Game Over! Score: ${score}`;
        return;
      }
      snake.unshift(head);
      if (head.x===food.x && head.y===food.y) { score++; document.getElementById('score').textContent='Score: '+score; placeFood(); }
      else snake.pop();
      draw();
    }

    function draw() {
      ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,canvas.width,canvas.height);
      // Draw food
      ctx.fillStyle = '#ff007f';
      ctx.fillRect(food.x*CELL, food.y*CELL, CELL-2, CELL-2);
      // Draw snake
      snake.forEach((s,i) => {
        ctx.fillStyle = i===0 ? '#22c55e' : '#166534';
        ctx.fillRect(s.x*CELL, s.y*CELL, CELL-2, CELL-2);
      });
    }

    document.addEventListener('keydown', e => {
      if (!running) return;
      if (e.key==='ArrowUp' && dir.y===0) dir={x:0,y:-1};
      else if (e.key==='ArrowDown' && dir.y===0) dir={x:0,y:1};
      else if (e.key==='ArrowLeft' && dir.x===0) dir={x:-1,y:0};
      else if (e.key==='ArrowRight' && dir.x===0) dir={x:1,y:0};
    });

    draw();
  
    // ===== MOBILE: dispatch keyboard events from touch buttons =====
    function touchKey(k, down) {
      window.dispatchEvent(new KeyboardEvent(down ? 'keydown' : 'keyup', { key: k, code: k, bubbles: true }));
    }
    // Prevent default touch scroll on game canvas
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    // ===== END MOBILE =====

  </script>

  <div id="touch-dpad" class="udlr">
    <div></div>
    <div class="dpad-btn" id="btn-up"
         ontouchstart="touchKey('ArrowUp',true)" ontouchend="touchKey('ArrowUp',false)"
         onmousedown="touchKey('ArrowUp',true)" onmouseup="touchKey('ArrowUp',false)">▲</div>
    <div></div>
    <div class="dpad-btn" id="btn-left"
         ontouchstart="touchKey('ArrowLeft',true)" ontouchend="touchKey('ArrowLeft',false)"
         onmousedown="touchKey('ArrowLeft',true)" onmouseup="touchKey('ArrowLeft',false)">◀</div>
    <div class="dpad-btn" id="btn-down"
         ontouchstart="touchKey('ArrowDown',true)" ontouchend="touchKey('ArrowDown',false)"
         onmousedown="touchKey('ArrowDown',true)" onmouseup="touchKey('ArrowDown',false)">▼</div>
    <div class="dpad-btn" id="btn-right"
         ontouchstart="touchKey('ArrowRight',true)" ontouchend="touchKey('ArrowRight',false)"
         onmousedown="touchKey('ArrowRight',true)" onmouseup="touchKey('ArrowRight',false)">▶</div>
  </div>
  <div id="touch-hint">Use the D-pad to move</div>
</body>
</html>
