<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Tap Sword Duel</title>
  <style>
    body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    #ui { position: absolute; top: 20px; text-align: center; z-index: 10; pointer-events: none; }
    h1 { margin: 0; font-size: 24px; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; }
    #score { font-size: 18px; margin-top: 5px; color: #fff; }
    #message { position: absolute; font-size: 32px; font-weight: bold; color: #ff0055; text-shadow: 0 0 15px #ff0055; text-align: center; pointer-events: none; display: none; z-index: 20; }
    canvas { background: #111; box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); border-radius: 10px; }
    .nav { position: absolute; bottom: 20px; display: flex; gap: 20px; z-index: 30; }
    .btn { padding: 10px 20px; background: rgba(0, 210, 255, 0.1); border: 2px solid #00d2ff; color: #00d2ff; text-decoration: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
    .btn:hover { background: #00d2ff; color: #000; }
  
    /* ===== MOBILE TOUCH CONTROLS ===== */
    #touch-dpad {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    @media (max-width: 900px), (pointer: coarse) {
      #touch-dpad { display: grid; }
    }
    #touch-dpad.lr { grid-template-columns: 1fr 1fr; gap: 20px; }
    #touch-dpad.udlr { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 6px; width: 180px; }
    #touch-dpad.tap { grid-template-columns: 1fr; }
    .dpad-btn {
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: 2px solid rgba(255,255,255,0.35);
      color: white;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: background 0.1s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: rgba(0,210,255,0.4);
      border-color: #00d2ff;
      transform: scale(0.9);
    }
    .dpad-btn.tap-btn {
      width: 120px;
      height: 120px;
      font-size: 40px;
      background: rgba(0,210,255,0.15);
      border-color: #00d2ff;
    }
    #touch-hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      pointer-events: none;
      z-index: 9998;
      display: none;
    }
    @media (max-width: 900px), (pointer: coarse) {
      #touch-hint { display: block; }
      canvas { touch-action: none; }
    }
    /* ===== END MOBILE TOUCH CONTROLS ===== */

  </style>
</head>
<body>
  <div id="ui">
    <h1>One Tap Sword Duel</h1>
    <div id="score">Score: 0</div>
    <div style="font-size:12px; color:#aaa; margin-top:5px; pointer-events:none;">Use SPACE to interact. ARROWS to move.</div>
  </div>
  <div id="message">GAME OVER</div>
  
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  
  <div class="nav">
    <a href="../../index.html" class="btn">Return to Hub</a>
    <button class="btn" onclick="initGame()">Restart</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgDef = document.getElementById('message');
    const scoreDef = document.getElementById('score');
    
    let isGameOver = false;
    let score = 0;
    let frames = 0;
    
    let player = { x: 200, y: 500, size: 20, color: '#00d2ff' };
    let objects = [];
    
    function initGame() {
      isGameOver = false;
      score = 0;
      frames = 0;
      msgDef.style.display = 'none';
      player = { x: 200, y: 500, size: 20, color: '#00d2ff' };
      objects = [];
      
      // Setup based on game ID
      if ('one-tap-sword-duel' === 'gravity-flip-runner') player.y = 550;
      if ('one-tap-sword-duel' === 'ice-slide-puzzle') { player.x = 50; player.y = 50; objects.push({x:300, y:500, size:40, color:'#0f0'}); } // Goal
      if ('one-tap-sword-duel' === 'perfect-shot') { objects.push({x:200, y:300, size:50, color:'#ff0055'}); player.y = 550; player.size = 10; }
      
      loop();
    }
    
    window.addEventListener('keydown', e => {
      if (isGameOver && e.code === 'Space') { initGame(); return; }
      if (isGameOver) return;
      
      if ('one-tap-sword-duel' === 'gravity-flip-runner' && e.code === 'Space') {
         player.y = player.y > 300 ? 50 : 550;
      }
      if ('one-tap-sword-duel' === 'perfect-shot' && e.code === 'Space') {
         let d = Math.abs(player.x - 200);
         if (d < 30) { score++; objects[0].size = Math.max(10, objects[0].size - 5); } else { isGameOver = true; }
      }
      if ('one-tap-sword-duel' === 'ice-slide-puzzle') {
         if (e.code === 'ArrowRight') player.x += 50;
         if (e.code === 'ArrowDown') player.y += 50;
         if (player.x > 300 && player.y > 500) { score++; isGameOver=true; msgDef.innerText="YOU WIN!"; msgDef.style.color="#0f0"; msgDef.style.display = 'block'; }
      }
      if ('one-tap-sword-duel' === 'one-tap-sword-duel' && e.code === 'Space') {
         if (objects.length > 0 && objects[0].y > 400 && objects[0].y < 500) { score++; objects=[]; }
         else { isGameOver = true; }
      }
      if ('one-tap-sword-duel' === 'shape-shift-escape' && e.code === 'Space') {
         player.color = player.color === '#00d2ff' ? '#ff0055' : '#00d2ff';
      }
      if ('one-tap-sword-duel' === 'wind-archer' && e.code === 'Space') {
         score++; 
      }

      if (e.code === 'ArrowLeft') player.x -= 20;
      if (e.code === 'ArrowRight') player.x += 20;
    });

    window.addEventListener('touchstart', e => {
       window.dispatchEvent(new KeyboardEvent('keydown', { code: 'Space' }));
    });

    function update() {
      if (isGameOver) return;
      frames++;
      scoreDef.innerText = 'Score: ' + score;
      
      if ('one-tap-sword-duel' === 'color-match-breaker' || 'one-tap-sword-duel' === 'spiral-fall' || 'one-tap-sword-duel' === 'memory-flash-grid') {
         score++;
         if (frames % 60 === 0) objects.push({x: Math.random()*380, y: 0, size: 20, color: '#ff0055'});
         objects.forEach(o => o.y += 5);
      }
      
      if ('one-tap-sword-duel' === 'one-tap-sword-duel') {
         if (frames % 100 === 0) objects.push({x: 180, y: 100, size: 40, color: '#ff0055'});
         objects.forEach(o => o.y += 4);
      }

      if ('one-tap-sword-duel' === 'shape-shift-escape') {
         score++;
         if (frames % 80 === 0) objects.push({x: 0, y: 0, w: 400, h: 20, color: Math.random()>0.5?'#00d2ff':'#ff0055'});
         objects.forEach(o => o.y += 6);
      }
      
      if ('one-tap-sword-duel' === 'perfect-shot') {
         player.x = 200 + Math.sin(frames * 0.1) * 150;
      }
      
      if ('one-tap-sword-duel' === 'gravity-flip-runner') {
         score++;
         if (frames % 50 === 0) objects.push({x: 400, y: Math.random()>0.5?50:550, size: 30, color: '#ff0055'});
         objects.forEach(o => o.x -= 6);
      }

      // Collisions
      objects.forEach(o => {
         let wT = o.w ? o.w : o.size;
         let hT = o.h ? o.h : o.size;
         let oX = o.w ? o.x : o.x - o.size/2;
         let oY = o.h ? o.y : o.y - o.size/2;

         if (
            player.x - player.size/2 < oX + wT &&
            player.x + player.size/2 > oX &&
            player.y - player.size/2 < oY + hT &&
            player.y + player.size/2 > oY
         ) {
            if ('one-tap-sword-duel' === 'shape-shift-escape' && player.color === o.color) return; 
            if ('one-tap-sword-duel' !== 'ice-slide-puzzle') isGameOver = true;
         }
      });
      
      if (isGameOver && msgDef.innerText !== "YOU WIN!") {
         msgDef.style.display = 'block';
         msgDef.innerText = 'GAME OVER';
         msgDef.style.color = '#ff0055';
      }
    }

    function draw() {
      ctx.clearRect(0, 0, 400, 600);
      
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x - player.size/2, player.y - player.size/2, player.size, player.size);
      
      objects.forEach(o => {
         ctx.fillStyle = o.color;
         if (o.w) ctx.fillRect(o.x, o.y, o.w, o.h);
         else ctx.fillRect(o.x - o.size/2, o.y - o.size/2, o.size, o.size);
      });
    }

    function loop() {
      update();
      draw();
      if (!isGameOver) requestAnimationFrame(loop);
    }
    
    initGame();
  
    // ===== MOBILE: tap button dispatches Space =====
    function touchTap() {
      window.dispatchEvent(new KeyboardEvent('keydown', { code: 'Space', key: ' ', bubbles: true }));
    }
    document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    // ===== END MOBILE =====

  </script>

  <div id="touch-dpad" class="tap">
    <div class="dpad-btn tap-btn"
         ontouchstart="touchTap()" onmousedown="touchTap()">TAP</div>
  </div>
  <div id="touch-hint">Tap to play</div>
</body>
</html>
