<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiral Fall</title>
  <style>
    body { margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, #001122, #000000); font-family: sans-serif; color: white; text-align: center; }
    .card { background: rgba(0, 210, 255, 0.05); padding: 50px; border-radius: 20px; backdrop-filter: blur(20px); border: 1px solid rgba(0, 210, 255, 0.2); max-width: 600px; box-shadow: 0 0 50px rgba(0,210,255,0.1); }
    h1 { margin-top: 0; font-size: 3rem; background: linear-gradient(90deg, #00d2ff, #7000ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p.desc { font-size: 1.2rem; line-height: 1.5; color: #ddd; margin-bottom: 10px; }
    p.visual { font-size: 1rem; color: #00d2ff; font-style: italic; margin-bottom: 30px; }
    .btn { display: inline-block; padding: 15px 30px; background: rgba(0, 210, 255, 0.1); border: 2px solid #00d2ff; color: #00d2ff; text-decoration: none; border-radius: 50px; font-weight: bold; transition: 0.3s; }
    .btn:hover { background: #00d2ff; color: #000; box-shadow: 0 0 20px #00d2ff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Spiral Fall</h1>
    <p class="desc">Ball falls through rotating spiral platforms.</p>
    <p class="visual">✨ Visual style: Gradients, glass-like materials, smooth rotations</p>
    <a href="../../index.html" class="btn">Back to Hub</a>
  </div>
</body>
</html>
